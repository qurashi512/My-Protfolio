name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Use standalone package.json
        run: cp package.github.json package.json

      - name: Install dependencies
        run: npm install

      - name: Copy existing assets to public/
        run: |
          mkdir -p public/cv public/images public/fonts
          [ -d cv ]     && cp -r cv/.     public/cv/     || true
          [ -d images ] && cp -r images/. public/images/ || true
          [ -d fonts ]  && cp -r fonts/.  public/fonts/  || true

      - name: Build for GitHub Pages
        run: npm run build
        env:
          # /your-repo-name/ if deploying to username.github.io/repo-name/
          # Use / if your repo is named username.github.io (root site)
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
